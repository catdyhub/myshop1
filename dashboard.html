<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>Dashboard</title>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js"></script>

<script src="firebase.js"></script>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0b1220;
  color:white;
}

.container{
  display:flex;
}

/* SIDEBAR */
.sidebar{
  width:220px;
  height:100vh;
  background:#111827;
  padding:20px;
}

.sidebar h3{
  margin-bottom:20px;
}

.sidebar a{
  display:block;
  color:white;
  text-decoration:none;
  margin:10px 0;
  padding:8px;
  border-radius:8px;
  background:rgba(255,255,255,0.05);
}

.sidebar a:hover{
  background:#3b82f6;
}

/* CONTENT */
.content{
  padding:20px;
  flex:1;
}

.card{
  background:#1f2937;
  padding:15px;
  border-radius:12px;
  margin-top:10px;
}
</style>

</head>

<body>

<div class="container">

<!-- SIDEBAR -->
<div class="sidebar">
  <h3>⚡ My Shop</h3>

  <a href="dashboard.html">🏠 Dashboard</a>
  <a href="shop.html">🛒 Shop</a>
  <a href="admin.html">🔐 Admin</a>

  <button onclick="logout()" style="margin-top:20px;width:100%;padding:10px;background:red;color:white;border:none;border-radius:8px;">
    Logout
  </button>
</div>

<!-- CONTENT -->
<div class="content">

<h2>📊 Dashboard</h2>

<div class="card">
  <p>👤 User: <span id="userEmail">-</span></p>
</div>

<div class="card">
  <p>💰 Wallet: 0 ฿ (demo)</p>
</div>

</div>

</div>

<script>

// 🔐 เช็ค login
auth.onAuthStateChanged(user=>{
  if(!user){
    location.href="index.html";
  }else{
    document.getElementById("userEmail").innerText = user.email;
  }
});

// 🚪 logout
function logout(){
  auth.signOut().then(()=>{
    location.href="index.html";
  });
}

</script>

</body>
</html>
