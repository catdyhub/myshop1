<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>Shop</title>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"></script>

<script src="firebase.js"></script>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0b1220;
  color:white;
}

.container{
  padding:20px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
  gap:10px;
}

.card{
  background:#1f2937;
  padding:15px;
  border-radius:12px;
  text-align:center;
}

button{
  margin-top:10px;
  width:100%;
  padding:10px;
  border:none;
  border-radius:8px;
  background:#22c55e;
  color:white;
  cursor:pointer;
}

button:hover{
  background:#16a34a;
}
</style>

</head>

<body>

<div class="container">

<h2>🛒 Shop</h2>

<div class="grid">

<div class="card">
<h3>Item A</h3>
<p>100 ฿</p>
<button onclick="buy('Item A',100)">ซื้อ</button>
</div>

<div class="card">
<h3>Item B</h3>
<p>200 ฿</p>
<button onclick="buy('Item B',200)">ซื้อ</button>
</div>

<div class="card">
<h3>VIP Pack</h3>
<p>500 ฿</p>
<button onclick="buy('VIP',500)">ซื้อ</button>
</div>

</div>

</div>

<script>

// 🔐 เช็ค login
auth.onAuthStateChanged(user=>{
  if(!user){
    location.href="index.html";
  }
});

// 🛒 ฟังก์ชันซื้อของ
function buy(item,price){

  let user = auth.currentUser;

  if(!user){
    alert("ต้อง login ก่อน");
    return;
  }

  db.collection("orders").add({
    user: user.email,
    item: item,
    price: price,
    time: new Date()
  });

  alert("ซื้อ " + item + " สำเร็จ!");
}

</script>

</body>
</html>
