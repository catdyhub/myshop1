<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>Register Page</title>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js"></script>

<!-- Firebase config -->
<script src="firebase.js"></script>

<style>
body{
  font-family:Arial;
  background:#0b1220;
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.box{
  background:#111827;
  padding:20px;
  border-radius:12px;
  width:300px;
}

input{
  width:100%;
  padding:10px;
  margin-top:10px;
  border:none;
  border-radius:8px;
}

button{
  width:100%;
  padding:10px;
  margin-top:10px;
  border:none;
  border-radius:8px;
  background:#22c55e;
  color:white;
  cursor:pointer;
}
</style>

</head>

<body>

<div class="box">

<h2>📝 Register</h2>

<input id="email" placeholder="Email">
<input id="pass" type="password" placeholder="Password">

<button onclick="register()">สมัครสมาชิก</button>
<button onclick="goLogin()">กลับไป Login</button>

</div>

<script>

// 📝 สมัครสมาชิก
function register(){
  auth.createUserWithEmailAndPassword(email.value, pass.value)
  .then(()=>{
    alert("สมัครสำเร็จ");
    location.href="dashboard.html";
  })
  .catch(e=>{
    alert(e.message);
  });
}

// 🔙 กลับหน้า login
function goLogin(){
  location.href="index.html";
}

</script>

</body>
</html>
