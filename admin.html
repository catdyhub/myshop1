<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>Admin Panel</title>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"></script>

<script src="firebase.js"></script>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0b1220;
  color:white;
}

.container{
  padding:20px;
}

.card{
  background:#1f2937;
  padding:15px;
  border-radius:12px;
  margin-top:10px;
}

button{
  padding:10px;
  border:none;
  border-radius:8px;
  background:#ef4444;
  color:white;
  cursor:pointer;
}

ul{
  list-style:none;
  padding:0;
}

li{
  background:#111827;
  margin-top:5px;
  padding:10px;
  border-radius:8px;
}
</style>

</head>

<body>

<div class="container">

<h2>🔐 Admin Panel</h2>

<div class="card">
<button onclick="loadOrders()">โหลด Orders</button>
</div>

<div class="card">
<h3>📦 Orders</h3>
<ul id="list"></ul>
</div>

</div>

<script>

// 🔐 เช็คว่า login + เป็น admin
auth.onAuthStateChanged(user=>{
  if(!user){
    location.href="index.html";
  }else if(user.email !== "admin@gmail.com"){
    alert("ไม่มีสิทธิ์เข้า Admin");
    location.href="dashboard.html";
  }
});

// 📦 โหลด orders
function loadOrders(){

  db.collection("orders").get().then(snap=>{
    list.innerHTML="";

    snap.forEach(doc=>{
      let d = doc.data();

      let li = document.createElement("li");
      li.innerText = d.user + " | " + d.item + " | " + d.price + "฿";

      list.appendChild(li);
    });

  });

}

</script>

</body>
</html>
