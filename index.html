<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>Pro Shop Dashboard</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');

body{
  margin:0;
  font-family:'Inter',sans-serif;
  background: radial-gradient(circle at top,#111827,#0b1220);
  color:#fff;
}

/* NAVBAR */
.nav{
  display:flex;
  justify-content:space-between;
  padding:18px 25px;
  background:rgba(255,255,255,0.05);
  backdrop-filter: blur(10px);
  border-bottom:1px solid rgba(255,255,255,0.1);
}

/* CONTAINER */
.container{
  max-width:1000px;
  margin:auto;
  padding:25px;
}

/* CARD */
.card{
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.1);
  padding:18px;
  border-radius:16px;
  margin-top:15px;
  box-shadow:0 10px 30px rgba(0,0,0,0.3);
}

/* INPUT */
input{
  width:100%;
  padding:12px;
  margin-top:8px;
  border-radius:10px;
  border:none;
  outline:none;
  background:rgba(255,255,255,0.1);
  color:white;
}

/* BUTTON */
button{
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:10px;
  font-weight:600;
  cursor:pointer;
  transition:0.2s;
}

button:hover{
  transform:scale(1.03);
}

.blue{background:#3b82f6;color:white;}
.green{background:#22c55e;color:white;}
.red{background:#ef4444;color:white;}

/* GRID SHOP */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
  gap:12px;
}

.item{
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.1);
  padding:15px;
  border-radius:14px;
  text-align:center;
  transition:0.2s;
}

.item:hover{
  transform:translateY(-5px);
  background:rgba(255,255,255,0.08);
}

/* TITLE */
h2,h3{
  margin:5px 0;
}
</style>
</head>

<body>

<div class="nav">
  <div>⚡ Pro Shop</div>
  <div>💰 <span id="bal">0</span> ฿</div>
</div>

<div class="container">

<!-- LOGIN -->
<div class="card">
<h3>🔐 Login System</h3>
<input id="email" placeholder="email">
<input id="pass" type="password" placeholder="password">
<button class="blue" onclick="login()">Login</button>
<button class="green" onclick="register()">Register</button>
</div>

<!-- WALLET -->
<div class="card">
<h3>💳 Wallet</h3>
<button class="blue" onclick="addMoney()">เติมเงิน +100</button>
</div>

<!-- SHOP -->
<div class="card">
<h3>🛒 Shop</h3>

<div class="grid">

<div class="item">
<h4>Item A</h4>
<p>100฿</p>
<button class="green" onclick="buy('Item A',100)">Buy</button>
</div>

<div class="item">
<h4>Item B</h4>
<p>200฿</p>
<button class="green" onclick="buy('Item B',200)">Buy</button>
</div>

<div class="item">
<h4>VIP</h4>
<p>500฿</p>
<button class="green" onclick="buy('VIP',500)">Buy</button>
</div>

</div>

</div>

<!-- ADMIN -->
<div class="card" id="admin" style="display:none;">
<h3>🔐 Admin Panel</h3>
<button class="red" onclick="loadUsers()">Load Users</button>
<ul id="users"></ul>
</div>

</div>
